<div class="side-panel" [class.open]="isOpen">
  <div class="side-panel-overlay" (click)="onClose()"></div>

  <div class="side-panel-content">
    <div class="side-panel-header">
      <h3>{{ isEditMode ? 'Editar Servicio' : 'Crear Nuevo Servicio' }}</h3>
      <button class="btn-close-panel" (click)="onClose()">
        ✕
      </button>
    </div>

    <form class="service-form" (ngSubmit)="onSubmit()">

      <div class="form-group">
        <label>Nombre <span class="required">*</span></label>
        <input
          type="text"
          class="form-control"
          [(ngModel)]="service.name"
          name="name"
          placeholder="Ingrese el nombre del servicio"
          required>
      </div>

      <div class="form-group">
        <label>Descripción <span class="required">*</span></label>
        <textarea
          class="form-control"
          [(ngModel)]="service.description"
          name="description"
          placeholder="Ingrese la descripción"
          rows="3"
          required>
        </textarea>
      </div>

      <div class="form-group checkbox-group">
        <label>
          <input
            type="checkbox"
            [(ngModel)]="service.active"
            name="active">
          Activo
        </label>
      </div>

      <div class="form-actions">
        <button type="button" class="btn-cancel" (click)="onClose()">
          Cancelar
        </button>

        <button type="submit" class="btn-submit">
          {{ isEditMode ? 'Guardar Cambios' : 'Crear Servicio' }}
        </button>
      </div>

    </form>
  </div>
</div>
