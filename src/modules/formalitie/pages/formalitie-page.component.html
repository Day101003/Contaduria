<div class="formalities-container">
  <div class="header">
    <h1>Gestión de Formalidades</h1>
    <button class="btn-primary" (click)="openCreateForm()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="12" y1="5" x2="12" y2="19"></line>
        <line x1="5" y1="12" x2="19" y2="12"></line>
      </svg>
      Crear Formalidad
    </button>
  </div>

  <app-data-table
    [columns]="columns"
    [data]="pagination.paginatedItems()"
    [actions]="actions"
    [loading]="formalitieStore.loading()"
    [error]="formalitieStore.error()"
    emptyMessage="No hay formalidades registradas">
  </app-data-table>

  <app-pagination [pagination]="pagination"></app-pagination>

</div>

<app-formalitie-form
  [isOpen]="showCreateForm"
  [isEditMode]="isEditMode"
  [formalitie]="newFormalitie"
  (closeForm)="closeForm()"
  (saveForm)="saveFormalitie()">
</app-formalitie-form>
