<div class="formalitie-builder">
  <div class="builder-header">
    <div class="formalitie-info">
      <input
        type="text"
        class="formalitie-name-input"
        [(ngModel)]="formalitieName"
        placeholder="Nombre del tramite"
      />
      <textarea
        class="formalitie-description-input"
        [(ngModel)]="formalitieDescription"
        placeholder="Descripción del tramite (opcional)"
        rows="2"
      ></textarea>
    </div>
  </div>

  <div class="fields-section">
    <div class="section-header">
      <h3>Campos del formulario</h3>
      <button type="button" class="btn btn-primary btn-sm" (click)="openFieldTypeSelector()">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="16"
          height="16"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <line x1="12" y1="5" x2="12" y2="19"></line>
          <line x1="5" y1="12" x2="19" y2="12"></line>
        </svg>
        Agregar campo
      </button>
    </div>

    <div class="fields-list">
      <div *ngFor="let field of paginatedFields; let i = index" class="field-item">
        <div class="field-order-controls">
          <button
            type="button"
            class="order-btn"
            (click)="moveFieldUp(getRealIndex(i))"
            [disabled]="getRealIndex(i) === 0"
          >
            ▲
          </button>

          <span class="order-number">{{ getRealIndex(i) + 1 }}</span>

          <button
            type="button"
            class="order-btn"
            (click)="moveFieldDown(getRealIndex(i))"
            [disabled]="getRealIndex(i) === fields.length - 1"
          >
            ▼
          </button>
        </div>

        <div class="field-type-badge">
          <span>{{ getFieldTypeLabel(field.type) }}</span>
        </div>

        <div class="field-info">
          <span class="field-label">{{ field.label }}</span>
          <span *ngIf="field.validation?.required" class="required-badge">Requerido</span>
        </div>

        <div class="field-actions">
          <button
            type="button"
            class="action-btn"
            (click)="openFieldEditor(field)"
            title="Editar"
            aria-label="Editar"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M12 20h9"></path>
              <path d="M16.5 3.5a2.121 2.121 0 1 1 3 3L7 19l-4 1 1-4 12.5-12.5z"></path>
            </svg>
          </button>

          <button
            type="button"
            class="action-btn"
            (click)="duplicateField(field)"
            title="Duplicar"
            aria-label="Duplicar"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
              <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
            </svg>
          </button>

          <button
            type="button"
            class="action-btn"
            (click)="deleteField(field)"
            title="Eliminar"
            aria-label="Eliminar"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <polyline points="3 6 5 6 21 6"></polyline>
              <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"></path>
              <path d="M10 11v6"></path>
              <path d="M14 11v6"></path>
              <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"></path>
            </svg>
          </button>
        </div>
      </div>
    </div>

    <div *ngIf="showPagination" class="pagination-container">
      <app-pagination [pagination]="pagination"></app-pagination>
    </div>

    <div *ngIf="fields.length === 0" class="empty-state">
      <p>No hay campos configurados</p>
      <button type="button" class="btn btn-primary" (click)="openFieldTypeSelector()">
        Agregar primer campo
      </button>
    </div>
  </div>

  <div class="builder-footer">
    <button type="button" class="btn btn-secondary" (click)="onCancel()">Cancelar</button>

    <button type="button" class="btn btn-primary" (click)="onSaveFormalitie()">
      Guardar tramite
    </button>
  </div>
</div>

<div *ngIf="showFieldTypeSelector" class="modal-overlay" (click)="closeFieldTypeSelector()">
  <div class="modal-content field-type-modal" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h3>Seleccionar tipo de campo</h3>
      <button type="button" class="close-btn" (click)="closeFieldTypeSelector()">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="20"
          height="20"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>

    <div class="field-type-grid">
      <button
        *ngFor="let ft of fieldTypes"
        type="button"
        class="field-type-card"
        (click)="selectFieldType(ft.type)"
      >
        <div class="field-type-icon">
          <i [attr.data-feather]="ft.icon"></i>
        </div>
        <span class="field-type-name">{{ ft.label }}</span>
        <span class="field-type-desc">{{ ft.description }}</span>
      </button>
    </div>
  </div>
</div>

<div *ngIf="showFieldEditor" class="modal-overlay" (click)="closeFieldEditor()">
  <div class="modal-content field-editor-modal" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h3>{{ editingField ? 'Editar campo' : 'Nuevo campo' }}</h3>
      <button type="button" class="close-btn" (click)="closeFieldEditor()">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="20"
          height="20"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>

    <div class="modal-body">
      <div class="form-section">
        <h4>Información básica</h4>

        <div class="form-group">
          <label>Etiqueta del campo *</label>
          <input type="text" [(ngModel)]="editorForm.label" placeholder="Ej: Nombre del cliente" />
        </div>

        <div class="form-group">
          <label>Tipo de campo</label>
          <select [(ngModel)]="editorForm.type" [disabled]="!!editingField">
            <option *ngFor="let ft of fieldTypes" [value]="ft.type">{{ ft.label }}</option>
          </select>
        </div>

        <div class="form-group" *ngIf="editorForm.type !== 'CHECKBOX'">
          <label>Texto de ayuda (placeholder)</label>
          <input
            type="text"
            [(ngModel)]="editorForm.placeholder"
            placeholder="Ej: Ingresa el nombre..."
          />
        </div>

        <div class="form-group">
          <label>Texto de ayuda adicional</label>
          <input
            type="text"
            [(ngModel)]="editorForm.helpText"
            placeholder="Ej: Este campo es opcional"
          />
        </div>
      </div>

      <div class="form-section">
        <h4>Validación</h4>

        <div class="form-group checkbox-group">
          <label>
            <input type="checkbox" [(ngModel)]="editorForm.required" />
            Campo obligatorio
          </label>
        </div>

        <ng-container *ngIf="editorForm.type === 'TEXT' || editorForm.type === 'TEXTAREA'">
          <div class="form-row">
            <div class="form-group">
              <label>Longitud mínima</label>
              <input type="number" [(ngModel)]="editorForm.minLength" min="0" />
            </div>
            <div class="form-group">
              <label>Longitud máxima</label>
              <input type="number" [(ngModel)]="editorForm.maxLength" min="0" />
            </div>
          </div>
        </ng-container>

        <ng-container *ngIf="editorForm.type === 'NUMBER'">
          <div class="form-row">
            <div class="form-group">
              <label>Valor mínimo</label>
              <input type="number" [(ngModel)]="editorForm.min" />
            </div>
            <div class="form-group">
              <label>Valor máximo</label>
              <input type="number" [(ngModel)]="editorForm.max" />
            </div>
          </div>
        </ng-container>

        <ng-container *ngIf="editorForm.type === 'FILE'">
          <div class="form-group">
            <label>Tipos de archivo permitidos</label>
            <input type="text" [(ngModel)]="editorForm.accept" placeholder="Ej: .pdf,.doc,.docx" />
            <small>Separar extensiones con coma</small>
          </div>
          <div class="form-group">
            <label>Tamaño máximo (MB)</label>
            <input type="number" [(ngModel)]="editorForm.maxFileSize" min="0" />
          </div>
        </ng-container>

        <ng-container *ngIf="editorForm.type === 'IMAGE'">
          <div class="form-group">
            <label>Tamaño máximo (MB)</label>
            <input type="number" [(ngModel)]="editorForm.maxFileSize" min="0" />
          </div>
        </ng-container>
      </div>

      <div class="form-section" *ngIf="editorForm.type === 'SELECT'">
        <h4>Opciones</h4>

        <div class="form-group checkbox-group">
          <label>
            <input type="checkbox" [(ngModel)]="editorForm.multiple" />
            Permitir selección múltiple
          </label>
        </div>

        <div class="options-list">
          <div
            *ngFor="let option of editorForm.options; let i = index; trackBy: trackByIndex"
            class="option-row"
          >
            <input
              type="text"
              [(ngModel)]="option.label"
              placeholder="Etiqueta"
              (ngModelChange)="option.value = option.value || option.label"
            />
            <input type="text" [(ngModel)]="option.value" placeholder="Valor" />
            <button type="button" class="remove-option-btn" (click)="removeOption(i)">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="16"
                height="16"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <line x1="18" y1="6" x2="6" y2="18"></line>
                <line x1="6" y1="6" x2="18" y2="18"></line>
              </svg>
            </button>
          </div>
        </div>

        <button type="button" class="btn btn-secondary btn-sm" (click)="addOption()">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="14"
            height="14"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
          </svg>
          Agregar opción
        </button>
      </div>
    </div>

    <div class="modal-footer">
      <button type="button" class="btn btn-secondary" (click)="closeFieldEditor()">Cancelar</button>
      <button
        type="button"
        class="btn btn-primary"
        (click)="saveField()"
        [disabled]="!editorForm.label.trim()"
      >
        {{ editingField ? 'Actualizar' : 'Agregar' }} campo
      </button>
    </div>
  </div>
</div>
