<div class="report-fill-page">
  <!-- Page Header -->
  <div class="page-header">
    <div class="header-content">
      <h1>Llenar Reporte</h1>
      <p>Selecciona un tipo de reporte y completa el formulario</p>
    </div>
  </div>

  <!-- Success Message -->
  <div *ngIf="showSuccessMessage" class="success-message">
    <div class="success-content">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
        <polyline points="22 4 12 14.01 9 11.01"></polyline>
      </svg>
      <div>
        <strong>¡Reporte enviado exitosamente!</strong>
        <span>{{ lastSubmittedReport }}</span>
      </div>
    </div>
    <button type="button" class="dismiss-btn" (click)="dismissSuccessMessage()">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18"></line>
        <line x1="6" y1="6" x2="18" y2="18"></line>
      </svg>
    </button>
  </div>

  <!-- Report Type Selector -->
  <div class="report-selector-card">
    <label class="selector-label">Tipo de Reporte</label>
    <select
      class="report-select"
      [ngModel]="selectedTemplateId || ''"
      (ngModelChange)="onTemplateChange($event)"
      [disabled]="templateStore.loading()"
    >
      <option value="">-- Selecciona un tipo de reporte --</option>
      <option *ngFor="let template of templateStore.activeTemplates()" [value]="template.id">
        {{ template.name }}
      </option>
    </select>

    <!-- Loading indicator -->
    <div *ngIf="templateStore.loading()" class="loading-indicator">
      <div class="spinner"></div>
      <span>Cargando...</span>
    </div>
  </div>

  <!-- Dynamic Form -->
  <div *ngIf="getSelectedTemplate()" class="form-card">
    <app-dynamic-form-renderer
      [template]="getSelectedTemplate()"
      [isSubmitting]="templateStore.submitting()"
      submitLabel="Enviar Reporte"
      (formSubmit)="onFormSubmit($event)"
      (formCancel)="onFormCancel()"
    ></app-dynamic-form-renderer>
  </div>

  <!-- Empty State when no template selected -->
  <div *ngIf="!selectedTemplateId && !templateStore.loading()" class="empty-state-card">
    <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
      <polyline points="14 2 14 8 20 8"></polyline>
      <line x1="16" y1="13" x2="8" y2="13"></line>
      <line x1="16" y1="17" x2="8" y2="17"></line>
      <polyline points="10 9 9 9 8 9"></polyline>
    </svg>
    <h3>Selecciona un tipo de reporte</h3>
    <p>Elige un tipo de reporte del menú desplegable para ver el formulario correspondiente</p>
  </div>

  <!-- Error State -->
  <div *ngIf="templateStore.error()" class="error-card">
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"></circle>
      <line x1="12" y1="8" x2="12" y2="12"></line>
      <line x1="12" y1="16" x2="12.01" y2="16"></line>
    </svg>
    <span>{{ templateStore.error() }}</span>
  </div>
</div>
